seed: 42

models:
  separate: True

  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    initial_log_std: 0.0
    min_log_std: -5.0
    max_log_std: 2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS

  critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [512, 256, 128]
        activations: elu
    output: ONE

  critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [512, 256, 128]
        activations: elu
    output: ONE

  target_critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [512, 256, 128]
        activations: elu
    output: ONE

  target_critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [512, 256, 128]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 10000

agent:
  class: SAC
  gradient_steps: 4
  batch_size: 4096
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: [5.0e-04, 5.0e-04, 1.0e-03]
  random_timesteps: 1000
  learning_starts: 1000
  grad_norm_clip: 1.0
  learn_entropy: True
  initial_entropy_value: 1.0
  target_entropy: null
  rewards_shaper_scale: 1.0
  experiment:
    directory: "humanoid_sac"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

trainer:
  class: SequentialTrainer
  timesteps: 100000
  environment_info: log
